<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veltrix Admin - Giriş</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: #12121a;
            border: 1px solid #1e90ff33;
            border-radius: 12px;
            padding: 40px;
            width: 360px;
            box-shadow: 0 0 40px #1e90ff22;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 28px;
            color: #1e90ff;
            letter-spacing: 4px;
            text-shadow: 0 0 20px #1e90ff;
        }
        .logo p { color: #555; font-size: 13px; margin-top: 5px; }
        input {
            width: 100%;
            padding: 12px 16px;
            background: #1a1a25;
            border: 1px solid #1e90ff33;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            margin-bottom: 16px;
            outline: none;
            transition: border 0.3s;
        }
        input:focus { border-color: #1e90ff; }
        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #1e90ff, #0066cc);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            transition: opacity 0.3s;
        }
        button:hover { opacity: 0.85; }
        .error {
            background: #ff3b3b22;
            border: 1px solid #ff3b3b55;
            color: #ff6b6b;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>VELTRIX</h1>
            <p>Admin Panel</p>
        </div>
        {% if error %}
        <div class="error">⚠ {{ error }}</div>
        {% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Admin Şifresi" autofocus required>
            <button type="submit">GİRİŞ YAP</button>
        </form>
    </div>
</body>
</html>
