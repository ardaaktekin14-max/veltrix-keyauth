<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veltrix Admin - Giriş</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .video-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }
        .video-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85;
        }
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1;
        }
        .container {
            position: relative;
            z-index: 2;
            background: rgba(8, 3, 0, 0.78);
            border: 1px solid #ff6a0066;
            border-radius: 16px;
            padding: 44px 40px;
            width: 380px;
            box-shadow: 0 0 60px #ff450022, 0 0 120px #ff220011;
            backdrop-filter: blur(12px);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            font-size: 30px;
            color: #ff8c00;
            letter-spacing: 6px;
            text-shadow: 0 0 30px #ff4500, 0 0 60px #ff220055;
        }
        .logo p { color: #884400; font-size: 12px; margin-top: 6px; letter-spacing: 2px; }
        input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(20, 8, 0, 0.85);
            border: 1px solid #ff6a0033;
            border-radius: 8px;
            color: #ffcc99;
            font-size: 14px;
            margin-bottom: 14px;
            outline: none;
            transition: border 0.3s, box-shadow 0.3s;
        }
        input::placeholder { color: #664400; }
        input:focus {
            border-color: #ff6a00;
            box-shadow: 0 0 15px #ff450033;
        }
        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #ff6a00, #cc3300);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            transition: opacity 0.3s, box-shadow 0.3s;
            box-shadow: 0 0 20px #ff450033;
        }
        button:hover {
            opacity: 0.85;
            box-shadow: 0 0 35px #ff450066;
        }
        .error {
            background: #ff3b3b15;
            border: 1px solid #ff3b3b44;
            color: #ff9966;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 14px;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="video-bg">
    <video autoplay muted loop playsinline>
        <source src="https://i.makeagif.com/media/1-28-2023/HftgKb.mp4" type="video/mp4">
    </video>
</div>
<div class="overlay"></div>

<div class="container">
    <div class="logo">
        <h1>VELTRIX</h1>
        <p>ADMIN PANEL</p>
    </div>
    {% if error %}
    <div class="error">⚠ {{ error }}</div>
    {% endif %}
    <form method="POST">
        <input type="text" name="username" placeholder="Kullanıcı Adı" autofocus required>
        <input type="password" name="password" placeholder="Şifre" required>
        <button type="submit">GİRİŞ YAP</button>
    </form>
</div>

</body>
</html>
